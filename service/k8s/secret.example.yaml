# NO commitear con el valor real. Crear con:
#   kubectl create secret generic gemini-tts-secret -n claude \
#     --from-literal=GOOGLE_API_KEY=$(kubectl get secret rag-secrets -n rag-multimodal \
#       -o jsonpath='{.data.GOOGLE_API_KEY}' | base64 -d)
apiVersion: v1
kind: Secret
metadata:
  name: gemini-tts-secret
  namespace: claude
type: Opaque
stringData:
  GOOGLE_API_KEY: REPLACE_ME
